name: WC31 Ticket Watch

on:
  schedule:
    # Every 5 minutes, offset away from the top of the hour.
    - cron: "2/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wc31-ticket-watch
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Check tickets
        env:
          ALERT_PRICE: "450"
          REPORT_CEILING: "10000"
          MIN_GROUP_SIZE: "2"
          INCLUDE_ACCESSIBLE: "0"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          started_s=$(date +%s)
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const started = performance.now();

          const config = {
            apiUrl: "https://thegreatreviewer.com/api/seat-alerts/get-dashboard.php",
            eventUrl: "https://fwc26-resale-usd.tickets.fifa.com/secure/selection/event/seat/performance/10229226700919/lang/en",
            matchId: "10229226700919",
            alertPrice: Number(process.env.ALERT_PRICE || 450),
            reportCeiling: Number(process.env.REPORT_CEILING || 10000),
            minGroupSize: Number(process.env.MIN_GROUP_SIZE || 2),
            includeAccessible: /^(1|true|yes)$/i.test(process.env.INCLUDE_ACCESSIBLE || ""),
            discordWebhookUrl: process.env.DISCORD_WEBHOOK_URL || "",
          };

          const response = await fetch(config.apiUrl, {
            cache: "no-store",
            signal: AbortSignal.timeout(12000),
            headers: { "user-agent": "wc31-ticket-watch-github-actions/1.0" },
          });
          if (!response.ok) throw new Error(`Tracker API returned ${response.status}`);

          const data = await response.json();
          const match = (data.matches || []).find((candidate) => candidate.matchId === config.matchId) ||
            (data.matches || []).find((candidate) => /t[uü]rkiye|turkey/i.test(candidate.matchLabel || "") && /paraguay/i.test(candidate.matchLabel || ""));
          if (!match) throw new Error("Match #31 not found in tracker response");

          const pairs = findPairs(match.seats || []);
          const bestPair = pairs[0] || null;
          const underAlertPairs = pairs.filter((pair) => pair.perSeatMax < config.alertPrice);
          const trend = summarizeTrend(match);
          const elapsedMs = Math.round(performance.now() - started);

          const result = {
            ok: true,
            checkedAt: new Date().toISOString(),
            elapsedMs,
            generatedAt: data.generatedAt || null,
            scannedAt: match.scannedAt || null,
            matchLabel: match.matchLabel || "Türkiye vs Paraguay",
            bestPair,
            pairCount: pairs.length,
            underAlertCount: underAlertPairs.length,
            trend,
            notified: false,
          };

          if (underAlertPairs.length > 0 && config.discordWebhookUrl) {
            await sendDiscord(result, underAlertPairs[0]);
            result.notified = true;
          }

          console.log(JSON.stringify(result, null, 2));
          appendSummary(result);

          function findPairs(seats) {
            const normalized = seats.map(normalizeSeat).filter((seat) =>
              seat.block &&
              seat.row &&
              Number.isFinite(seat.seatNum) &&
              Number.isFinite(seat.price) &&
              seat.price < config.reportCeiling &&
              (config.includeAccessible || !/wheelchair/i.test(seat.category))
            );
            const byLocation = new Map();
            for (const seat of normalized) {
              const key = `${seat.block}|${seat.row}`;
              if (!byLocation.has(key)) byLocation.set(key, []);
              byLocation.get(key).push(seat);
            }

            const groups = [];
            for (const seatsAtLocation of byLocation.values()) {
              seatsAtLocation.sort((a, b) => a.seatNum - b.seatNum || a.price - b.price);
              for (let start = 0; start <= seatsAtLocation.length - config.minGroupSize; start++) {
                const group = [seatsAtLocation[start]];
                for (let cursor = start + 1; cursor < seatsAtLocation.length; cursor++) {
                  const current = seatsAtLocation[cursor];
                  if (current.seatNum !== group[group.length - 1].seatNum + 1) break;
                  group.push(current);
                  if (group.length >= config.minGroupSize) {
                    groups.push(toGroup(group));
                    break;
                  }
                }
              }
            }

            const seen = new Set();
            return groups.filter((group) => {
              if (seen.has(group.signature)) return false;
              seen.add(group.signature);
              return true;
            }).sort((a, b) => a.perSeatMax - b.perSeatMax || a.total - b.total);
          }

          function normalizeSeat(seat) {
            const seatText = String(seat.seat || seat.seatNumber || "").trim();
            const seatNum = Number((seatText.match(/\d+/) || [])[0]);
            return {
              block: String(seat.block || seat.section || "").trim(),
              row: String(seat.row || "").trim(),
              seat: seatText,
              seatNum,
              category: String(seat.category || ""),
              price: Number(seat.price),
              currency: seat.currency || "USD",
            };
          }

          function toGroup(group) {
            const prices = group.map((seat) => seat.price);
            const result = {
              block: group[0].block,
              row: group[0].row,
              seats: group.map((seat) => seat.seat),
              prices,
              perSeatMax: Math.max(...prices),
              total: prices.reduce((sum, price) => sum + price, 0),
              categories: [...new Set(group.map((seat) => seat.category))],
              currency: group[0].currency,
            };
            result.signature = `${result.block}|${result.row}|${result.seats.join(",")}|${result.prices.join(",")}`;
            return result;
          }

          function summarizeTrend(match) {
            const eligibleSeats = (match.seats || []).map(normalizeSeat).filter((seat) =>
              Number.isFinite(seat.price) && (config.includeAccessible || !/wheelchair/i.test(seat.category))
            ).sort((a, b) => a.price - b.price);
            const history = Array.isArray(match.priceHistory) ? match.priceHistory : [];
            const latest = history[history.length - 1] || null;
            const previous = history[history.length - 2] || null;
            return {
              sevenDayPct: finite(match.priceTrend7d),
              latestHistoryDay: latest ? latest.day : null,
              latestHistoryMin: finite(latest && latest.min),
              latestHistoryP10: finite(latest && latest.p10),
              latestHistoryCount: latest ? latest.count : null,
              p10MoveVsPrevious: latest && previous ? finite(Number(latest.p10) - Number(previous.p10)) : null,
              eligibleMin: finite(eligibleSeats[0] && eligibleSeats[0].price),
              median: finite(percentile(eligibleSeats, 0.5)),
              underAlertCount: eligibleSeats.filter((seat) => seat.price < config.alertPrice).length,
              under600Count: eligibleSeats.filter((seat) => seat.price < 600).length,
            };
          }

          function percentile(sortedSeats, pct) {
            if (!sortedSeats.length) return NaN;
            const index = Math.min(sortedSeats.length - 1, Math.max(0, Math.floor((sortedSeats.length - 1) * pct)));
            return sortedSeats[index].price;
          }

          function finite(value) {
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : null;
          }

          function usd(value) {
            const number = Number(value);
            if (!Number.isFinite(number)) return "n/a";
            return `$${number.toFixed(number % 1 ? 2 : 0)}`;
          }

          async function sendDiscord(result, pair) {
            const payload = {
              username: "WC31 Ticket Watch",
              allowed_mentions: { parse: [] },
              content: `WC #31 target hit: ${result.matchLabel}`,
              embeds: [{
                title: "WC #31 target hit",
                description: `[Open FIFA event page](${config.eventUrl})`,
                color: 0x2ecc71,
                fields: [
                  { name: "Best target pair", value: formatPair(pair), inline: false },
                  { name: "Counts", value: `${result.underAlertCount} under ${usd(config.alertPrice)}; ${result.pairCount} adjacent groups scanned`, inline: false },
                  { name: "Scanned", value: result.scannedAt || "unknown", inline: true },
                ],
                timestamp: result.checkedAt,
              }],
            };
            const response = await fetch(config.discordWebhookUrl, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload),
              signal: AbortSignal.timeout(8000),
            });
            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Discord webhook returned ${response.status}: ${body.slice(0, 300)}`);
            }
          }

          function formatPair(pair) {
            return [
              `Block ${pair.block}`,
              `Row ${pair.row}`,
              `Seats ${pair.seats.join(", ")}`,
              `${pair.prices.map(usd).join(" + ")} = ${usd(pair.total)}`,
              pair.categories.join(" / "),
            ].filter(Boolean).join(" | ");
          }

          function appendSummary(result) {
            if (!process.env.GITHUB_STEP_SUMMARY) return;
            const best = result.bestPair ? formatPair(result.bestPair) : "No adjacent pair found";
            const lines = [
              "## WC31 Ticket Watch",
              "",
              `- Checked: ${result.checkedAt}`,
              `- Script time: ${result.elapsedMs} ms`,
              `- Best pair: ${best}`,
              `- Adjacent groups: ${result.pairCount}`,
              `- Under ${usd(config.alertPrice)}: ${result.underAlertCount}`,
              `- Eligible min: ${usd(result.trend.eligibleMin)}`,
              `- Median: ${usd(result.trend.median)}`,
              `- Under $600: ${result.trend.under600Count}`,
              `- Scanned by source: ${result.scannedAt || "unknown"}`,
              "",
            ];
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n"));
          }
          NODE
          ended_s=$(date +%s)
          echo "Total shell step time: $((ended_s - started_s)) s"
